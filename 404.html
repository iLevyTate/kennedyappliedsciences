<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="color-scheme" content="dark">
<title>Page not found · Kennedy Applied Sciences</title>
<meta name="description" content="The page you were looking for could not be found.">
<meta name="robots" content="noindex, follow">
<meta name="theme-color" content="#0C0C0C">
<link rel="canonical" href="https://www.kennedyappliedsciences.com/">
<link rel="icon" href="/assets/icons/favicon.ico" sizes="any">
<link rel="icon" type="image/png" sizes="32x32" href="/assets/icons/favicon-32.png">
<link rel="icon" type="image/png" sizes="96x96" href="/assets/icons/favicon-96.png">
<link rel="apple-touch-icon" sizes="180x180" href="/assets/icons/apple-touch-icon.png">
<link rel="manifest" href="/site.webmanifest">
<style>
:root { --ob:#0C0C0C; --cu:#C87941; --cul:#DDA36A; --ash:#F8F7F5; --tg:#8A8A8A; --tgd:#5A5A5A; --rule:rgba(255,255,255,0.08); }
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%}
body{font-family:'DM Sans',system-ui,sans-serif;background:radial-gradient(1200px 800px at 85% -10%,rgba(200,121,65,0.06),transparent 60%),var(--ob);color:var(--ash);min-height:100vh;display:grid;place-items:center;padding:32px;line-height:1.6;-webkit-font-smoothing:antialiased}
main{max-width:560px;text-align:center}
.code{font-size:11px;letter-spacing:0.12em;text-transform:uppercase;color:var(--cu);margin-bottom:16px}
h1{font-size:clamp(34px,5vw,52px);font-weight:500;letter-spacing:-0.025em;line-height:1.1;margin-bottom:18px}
h1 .cu{color:var(--cu)}
p{color:var(--tg);font-size:16px;margin-bottom:32px;text-wrap:balance}
.btn{display:inline-block;background:var(--cu);color:var(--ob);font-size:12px;font-weight:500;letter-spacing:0.08em;text-transform:uppercase;padding:14px 28px;border-radius:10px;text-decoration:none;transition:background .25s, transform .25s, box-shadow .25s}
.btn:hover{background:var(--cul);transform:translateY(-1px);box-shadow:0 14px 32px rgba(200,121,65,0.26)}
.foot{margin-top:48px;font-size:11px;color:var(--tgd)}
a:focus-visible{outline:1px solid var(--cu);outline-offset:3px}
</style>
</head>
<body>
<main>
  <div class="code">Error 404</div>
  <h1>Page not <span class="cu">found.</span></h1>
  <p>The page you were looking for may have moved or no longer exists.</p>
  <a class="btn" href="/">Return home</a>
  <div class="foot">Kennedy Applied Sciences, Inc. &middot; &copy; 2026</div>
</main>
</body>
</html>
